version: "3.9"

services:
  law-gpt:
    build:
      context: .
      dockerfile: Dockerfile
    image: law-gpt:latest
    container_name: law-gpt-api
    ports:
      - "8000:8000"
    env_file:
      - config/.env
    environment:
      - RAG_STRATEGY=${RAG_STRATEGY:-hybrid_rag}
      - ENABLE_RAG_BENCHMARK=false
      - PORT=8000
      - LOG_LEVEL=INFO
    volumes:
      # Persist vector databases between restarts
      - ./chroma_db_hybrid:/app/chroma_db_hybrid
      - ./chroma_db_statutes:/app/chroma_db_statutes
      - ./pageindex_store:/app/pageindex_store
      - ./results:/app/results
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 8G

  benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    image: law-gpt:latest
    container_name: law-gpt-benchmark
    env_file:
      - config/.env
    volumes:
      - ./chroma_db_hybrid:/app/chroma_db_hybrid
      - ./results:/app/results
    command: python scripts/rag_benchmark.py --strategies all --tests all --output-dir results
    profiles:
      - benchmark   # Only runs with: docker compose --profile benchmark up benchmark

volumes:
  chroma_data:
  results_data:
